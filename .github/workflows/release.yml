name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild \
            -project MiddleClick.xcodeproj \
            -scheme MiddleClick \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create DMG
        run: |
          mkdir dmg_staging
          cp -R build/Build/Products/Release/MiddleClick.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -volname "MiddleClick" \
            -srcfolder dmg_staging \
            -ov -format UDZO -fs HFS+ \
            MiddleClick.dmg

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: MiddleClick.dmg
          generate_release_notes: true
